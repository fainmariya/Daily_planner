services:
  postgres:
    image: postgres:16
    container_name: daily_planner_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_pass
      POSTGRES_DB: planner_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
